name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag) -or !$tag.StartsWith("v")) {
            throw "Release tag must use the vX.Y.Z format. Received: $tag"
          }
          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0
          path: DicomVisionClient

      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: l5769389/DicomVisionServer
          ref: ${{ steps.release.outputs.tag }}
          path: DicomVisionServer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DicomVisionClient/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install server dependencies
        shell: pwsh
        working-directory: DicomVisionServer
        run: uv sync --frozen

      - name: Install client dependencies
        shell: pwsh
        working-directory: DicomVisionClient
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        working-directory: DicomVisionClient
        run: npm run release:win

      - name: Build web package
        shell: pwsh
        working-directory: DicomVisionClient
        run: |
          npm run build:web
          $version = "${{ steps.release.outputs.version }}"
          $archive = "DicomVision-web-v$version.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path "dist-web\*" -DestinationPath $archive -Force

      - name: Package standalone server bundle
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $archive = "DicomVisionServer-v$version-win-x64.zip"
          $bundle = "DicomVisionServer\dist\DicomVisionServer"
          if (!(Test-Path (Join-Path $bundle "DicomVisionServer.exe"))) {
            throw "Expected Windows server executable was not found in $bundle"
          }
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path $bundle -DestinationPath $archive -Force

      - name: Generate checksums
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $files = @(
            "DicomVisionClient\dist-electron\DicomVision-$version-Setup.exe",
            "DicomVisionClient\DicomVision-web-v$version.zip",
            "DicomVisionServer-v$version-win-x64.zip"
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            "$hash  $(Split-Path $file -Leaf)"
          }
          $lines | Set-Content -Path SHA256SUMS-windows.txt -Encoding UTF8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: DicomVision ${{ steps.release.outputs.tag }}
          body_path: DicomVisionClient/release-notes/${{ steps.release.outputs.tag }}.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            DicomVisionClient/dist-electron/DicomVision-${{ steps.release.outputs.version }}-Setup.exe
            DicomVisionClient/dist-electron/DicomVision-${{ steps.release.outputs.version }}-Setup.exe.blockmap
            DicomVisionClient/dist-electron/latest.yml
            DicomVisionClient/DicomVision-web-v${{ steps.release.outputs.version }}.zip
            DicomVisionServer-v${{ steps.release.outputs.version }}-win-x64.zip
            SHA256SUMS-windows.txt
