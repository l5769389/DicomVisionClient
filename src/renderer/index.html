<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: blob: http: https: ws: wss:; img-src 'self' data: blob: http: https:; connect-src 'self' http: https: ws: wss:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <title>DICOM Vision</title>
    <script>
      (() => {
        try {
          const supportedThemes = new Set(['industrial-utility', 'aurora', 'clinical-light'])
          const preferences = JSON.parse(localStorage.getItem('dicomvision-ui-preferences') || '{}')
          const themeId = supportedThemes.has(preferences.themeId) ? preferences.themeId : 'industrial-utility'
          document.documentElement.dataset.theme = themeId
          document.documentElement.style.colorScheme = themeId === 'clinical-light' ? 'light' : 'dark'
        } catch {
          document.documentElement.dataset.theme = 'industrial-utility'
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
    <style>
      :root {
        --app-start-background: linear-gradient(180deg, #11161b 0%, #090d11 52%, #05080b 100%);
        --app-start-panel-background: linear-gradient(180deg, rgba(20, 26, 32, 0.98), rgba(13, 18, 23, 0.995));
        --app-start-panel-border: rgba(151, 164, 176, 0.12);
        --app-start-panel-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.035),
          0 14px 30px rgba(0, 0, 0, 0.34);
        --app-start-mark-border: rgba(111, 169, 196, 0.36);
        --app-start-mark-background: linear-gradient(135deg, rgba(111, 169, 196, 0.34), rgba(201, 138, 66, 0.18));
        --app-start-placeholder: rgba(203, 213, 221, 0.09);
        --app-start-placeholder-soft: rgba(33, 40, 47, 0.72);
        --app-start-shimmer: rgba(255, 255, 255, 0.075);
        --app-start-viewer-border: rgba(151, 164, 176, 0.1);
        --app-start-viewer-grid: rgba(111, 169, 196, 0.035);
        --app-start-viewer-background: #05080b;
        --app-start-error-border: rgba(239, 119, 119, 0.45);
        --app-start-error-background: rgba(34, 11, 13, 0.92);
        --app-start-error-color: #ffd4d4;
        background: var(--app-start-background);
        color: #e7edf2;
        color-scheme: dark;
        font-family:
          "Segoe UI",
          "Microsoft YaHei UI",
          sans-serif;
      }

      :root[data-theme="aurora"] {
        --app-start-background:
          radial-gradient(circle at top left, rgba(50, 142, 221, 0.24), transparent 28%),
          radial-gradient(circle at bottom right, rgba(217, 112, 54, 0.16), transparent 26%),
          linear-gradient(180deg, #07111b, #0a1521 58%, #09121b);
        --app-start-panel-background: linear-gradient(180deg, rgba(6, 13, 24, 0.97), rgba(7, 14, 27, 0.99));
        --app-start-panel-border: rgba(255, 255, 255, 0.08);
        --app-start-panel-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 18px 42px rgba(0, 0, 0, 0.22);
        --app-start-mark-border: rgba(102, 208, 255, 0.32);
        --app-start-mark-background: linear-gradient(135deg, rgba(102, 208, 255, 0.34), rgba(255, 138, 91, 0.22));
        --app-start-placeholder: rgba(245, 247, 251, 0.08);
        --app-start-placeholder-soft: rgba(255, 255, 255, 0.035);
        --app-start-shimmer: rgba(255, 255, 255, 0.08);
        --app-start-viewer-border: rgba(255, 255, 255, 0.07);
        --app-start-viewer-grid: rgba(102, 208, 255, 0.04);
        --app-start-viewer-background: #02070d;
      }

      :root[data-theme="clinical-light"] {
        --app-start-background:
          radial-gradient(circle at top left, rgba(116, 167, 204, 0.12), transparent 26%),
          radial-gradient(circle at bottom right, rgba(160, 191, 214, 0.14), transparent 24%),
          linear-gradient(180deg, #edf3f8, #e4ecf3 58%, #dbe5ee);
        --app-start-panel-background: linear-gradient(180deg, rgba(248, 251, 254, 0.97), rgba(238, 245, 250, 0.99));
        --app-start-panel-border: rgba(66, 101, 138, 0.14);
        --app-start-panel-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          0 16px 34px rgba(71, 99, 125, 0.12);
        --app-start-mark-border: rgba(79, 143, 184, 0.34);
        --app-start-mark-background: linear-gradient(135deg, rgba(79, 143, 184, 0.22), rgba(148, 179, 202, 0.18));
        --app-start-placeholder: rgba(32, 50, 69, 0.08);
        --app-start-placeholder-soft: rgba(228, 237, 244, 0.88);
        --app-start-shimmer: rgba(255, 255, 255, 0.58);
        --app-start-viewer-border: rgba(66, 101, 138, 0.12);
        --app-start-viewer-grid: rgba(79, 143, 184, 0.05);
        --app-start-viewer-background: #f7fbfe;
        --app-start-error-border: rgba(184, 75, 75, 0.34);
        --app-start-error-background: rgba(255, 239, 239, 0.95);
        --app-start-error-color: #8a2b2b;
        color: #142235;
        color-scheme: light;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--app-start-background);
      }

      .app-start-shell {
        box-sizing: border-box;
        display: grid;
        height: 100%;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
      }

      .app-start-panel {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--app-start-panel-border);
        border-radius: 18px;
        background: var(--app-start-panel-background);
        box-shadow: var(--app-start-panel-shadow);
      }

      .app-start-panel--side {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 22px;
        padding: 22px;
      }

      .app-start-panel--main {
        display: grid;
        grid-template-rows: 58px minmax(0, 1fr);
        gap: 14px;
        padding: 14px;
      }

      .app-start-brand,
      .app-start-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .app-start-mark {
        width: 42px;
        height: 42px;
        border: 1px solid var(--app-start-mark-border);
        border-radius: 13px;
        background: var(--app-start-mark-background);
      }

      .app-start-line,
      .app-start-row,
      .app-start-pill {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: var(--app-start-placeholder);
      }

      .app-start-line::after,
      .app-start-row::after,
      .app-start-pill::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, var(--app-start-shimmer), transparent);
        content: "";
        animation: app-start-shimmer 1.25s ease-in-out infinite;
      }

      .app-start-line {
        width: 72%;
        height: 12px;
      }

      .app-start-line--brand {
        width: 132px;
        height: 18px;
      }

      .app-start-line--wide {
        width: 100%;
      }

      .app-start-line--short {
        width: 54%;
      }

      .app-start-stack,
      .app-start-list {
        display: grid;
        gap: 12px;
      }

      .app-start-row {
        height: 54px;
        border-radius: 14px;
        background: var(--app-start-placeholder-soft);
      }

      .app-start-pill {
        width: 116px;
        height: 34px;
        border-radius: 11px;
      }

      .app-start-pill--short {
        width: 72px;
      }

      .app-start-viewer {
        min-height: 0;
        border: 1px solid var(--app-start-viewer-border);
        border-radius: 14px;
        background:
          linear-gradient(var(--app-start-viewer-grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--app-start-viewer-grid) 1px, transparent 1px),
          var(--app-start-viewer-background);
        background-size: 42px 42px;
      }

      .app-start-error {
        position: fixed;
        right: 20px;
        bottom: 20px;
        max-width: min(420px, calc(100vw - 40px));
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid var(--app-start-error-border);
        border-radius: 14px;
        background: var(--app-start-error-background);
        color: var(--app-start-error-color);
        font-size: 13px;
        line-height: 1.45;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      @keyframes app-start-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @media (max-width: 900px) {
        .app-start-shell {
          grid-template-columns: 1fr;
        }
        .app-start-panel--side {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-start-shell" aria-hidden="true">
        <aside class="app-start-panel app-start-panel--side">
          <div class="app-start-brand">
            <span class="app-start-mark"></span>
            <span class="app-start-line app-start-line--brand"></span>
          </div>
          <div class="app-start-stack">
            <span class="app-start-line app-start-line--wide"></span>
            <span class="app-start-line"></span>
            <span class="app-start-line app-start-line--short"></span>
          </div>
          <div class="app-start-list">
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
          </div>
        </aside>
        <main class="app-start-panel app-start-panel--main">
          <div class="app-start-toolbar">
            <span class="app-start-pill"></span>
            <span class="app-start-pill app-start-pill--short"></span>
            <span class="app-start-pill app-start-pill--short"></span>
          </div>
          <div class="app-start-viewer"></div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
