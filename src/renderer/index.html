<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: blob: http: https: ws: wss:; img-src 'self' data: blob: http: https:; connect-src 'self' http: https: ws: wss:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <title>DICOM Vision</title>
    <style>
      :root {
        background: #07111b;
        color: #f5f7fb;
        color-scheme: dark;
        font-family:
          "Segoe UI",
          "Microsoft YaHei UI",
          sans-serif;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(180deg, #07111b, #09131f 58%, #070f18);
      }

      .app-start-shell {
        box-sizing: border-box;
        display: grid;
        height: 100%;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
      }

      .app-start-panel {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(6, 13, 24, 0.97), rgba(7, 14, 27, 0.99));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 18px 42px rgba(0, 0, 0, 0.22);
      }

      .app-start-panel--side {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 22px;
        padding: 22px;
      }

      .app-start-panel--main {
        display: grid;
        grid-template-rows: 58px minmax(0, 1fr);
        gap: 14px;
        padding: 14px;
      }

      .app-start-brand,
      .app-start-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .app-start-mark {
        width: 42px;
        height: 42px;
        border: 1px solid rgba(102, 208, 255, 0.32);
        border-radius: 13px;
        background: linear-gradient(135deg, rgba(102, 208, 255, 0.34), rgba(255, 138, 91, 0.22));
      }

      .app-start-line,
      .app-start-row,
      .app-start-pill {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(245, 247, 251, 0.08);
      }

      .app-start-line::after,
      .app-start-row::after,
      .app-start-pill::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        content: "";
        animation: app-start-shimmer 1.25s ease-in-out infinite;
      }

      .app-start-line {
        width: 72%;
        height: 12px;
      }

      .app-start-line--brand {
        width: 132px;
        height: 18px;
      }

      .app-start-line--wide {
        width: 100%;
      }

      .app-start-line--short {
        width: 54%;
      }

      .app-start-stack,
      .app-start-list {
        display: grid;
        gap: 12px;
      }

      .app-start-row {
        height: 54px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
      }

      .app-start-pill {
        width: 116px;
        height: 34px;
        border-radius: 11px;
      }

      .app-start-pill--short {
        width: 72px;
      }

      .app-start-viewer {
        min-height: 0;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        background:
          linear-gradient(rgba(102, 208, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(102, 208, 255, 0.04) 1px, transparent 1px),
          #02070d;
        background-size: 42px 42px;
      }

      .app-start-error {
        position: fixed;
        right: 20px;
        bottom: 20px;
        max-width: min(420px, calc(100vw - 40px));
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid rgba(255, 138, 91, 0.45);
        border-radius: 14px;
        background: rgba(28, 10, 8, 0.92);
        color: #ffd4c6;
        font-size: 13px;
        line-height: 1.45;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      @keyframes app-start-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @media (max-width: 900px) {
        .app-start-shell {
          grid-template-columns: 1fr;
        }
        .app-start-panel--side {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-start-shell" aria-hidden="true">
        <aside class="app-start-panel app-start-panel--side">
          <div class="app-start-brand">
            <span class="app-start-mark"></span>
            <span class="app-start-line app-start-line--brand"></span>
          </div>
          <div class="app-start-stack">
            <span class="app-start-line app-start-line--wide"></span>
            <span class="app-start-line"></span>
            <span class="app-start-line app-start-line--short"></span>
          </div>
          <div class="app-start-list">
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
            <span class="app-start-row"></span>
          </div>
        </aside>
        <main class="app-start-panel app-start-panel--main">
          <div class="app-start-toolbar">
            <span class="app-start-pill"></span>
            <span class="app-start-pill app-start-pill--short"></span>
            <span class="app-start-pill app-start-pill--short"></span>
          </div>
          <div class="app-start-viewer"></div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
